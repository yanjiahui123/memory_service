# Dagster instance configuration
# 文档: https://docs.dagster.io/deployment/dagster-instance
#
# 默认 Dagster 使用本地 SQLite 存储运行记录和事件日志。
# 生产环境建议切换为 PostgreSQL，以支持多进程部署和持久化。
# 需要安装: pip install dagster-postgres
#
# 使用前请设置以下环境变量:
#   DAGSTER_PG_HOST      — 数据库主机（默认 localhost）
#   DAGSTER_PG_PORT      — 数据库端口（默认 5432）
#   DAGSTER_PG_DB        — 数据库名称（默认 dagster）
#   DAGSTER_PG_USERNAME  — 数据库用户名
#   DAGSTER_PG_PASSWORD  — 数据库密码

storage:
  postgres:
    postgres_db:
      hostname:
        env: DAGSTER_PG_HOST
      port:
        env: DAGSTER_PG_PORT
      username:
        env: DAGSTER_PG_USERNAME
      password:
        env: DAGSTER_PG_PASSWORD
      db_name:
        env: DAGSTER_PG_DB

telemetry:
  enabled: false
